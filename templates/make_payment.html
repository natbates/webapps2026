{% extends "base.html" %}

{% block title %}Make Payment{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-8 rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
  <h1 class="text-2xl font-semibold mb-4">Make Payment</h1>
  <form method="post">{% csrf_token %}
    <div class="mb-3">
      <label for="to_username" class="block text-sm mb-1">Recipient username</label>
      <input id="to_username" name="to_username" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-200/40" required>
    </div>

    <div class="mb-3">
      <label for="amount" class="block text-sm mb-1">Amount</label>
      <input id="amount" name="amount" type="number" step="0.01" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-200/40" required>
    </div>

    <div class="mb-3">
      <label for="currency" class="block text-sm mb-1">Currency (optional)</label>
      <select id="currency" name="currency" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-200/40">
        <option value="">(use your account currency)</option>
        <option value="GBP">GBP</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="message" class="block text-sm mb-1">Message (optional)</label>
      <input id="message" name="message" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-200/40">
    </div>

    <button class="rounded-2xl bg-sky-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Send</button>
  </form>
  <p class="mt-4"><a class="text-sky-600" href="{% url 'payapp:transactions' %}">Back to transactions</a></p>
</div>
{% endblock %}
