{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10">
  <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
    <h3 class="text-2xl font-semibold mb-4">Create account</h3>


    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="mb-3 text-red-700">{{ form.non_field_errors }}</div>
      {% endif %}
      {% crispy form %}

      <div class="mt-4 flex flex-wrap items-center gap-3">
        <button class="rounded-2xl bg-sky-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700" type="submit">Register</button>
        <button type="reset" class="rounded-2xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-slate-400">Clear</button>
        <a class="ml-auto text-sm text-sky-600 hover:underline" href="{% url 'login:login' %}">Already registered? Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
