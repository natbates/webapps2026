{% extends "payapp/base.html" %}

{% block title %}Make Payment{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-8 container-card">
  <h1 class="text-2xl mb-4">Make Payment</h1>
  <form method="post">{% csrf_token %}
    <div class="mb-3">
      <label for="to_username" class="block text-sm mb-1">Recipient username</label>
      <input id="to_username" name="to_username" required>
    </div>

    <div class="mb-3">
      <label for="amount" class="block text-sm mb-1">Amount</label>
      <input id="amount" name="amount" type="number" step="0.01" required>
    </div>

    <div class="mb-3">
      <label for="currency" class="block text-sm mb-1">Currency (optional)</label>
      <select id="currency" name="currency">
        <option value="">(use your account currency)</option>
        <option value="GBP">GBP</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="message" class="block text-sm mb-1">Message (optional)</label>
      <input id="message" name="message">
    </div>

    <button class="bg-sky-600 text-white px-4 py-2" type="submit">Send</button>
  </form>
  <p class="mt-4"><a class="text-sky-600" href="{% url 'payapp:transactions' %}">Back to transactions</a></p>
</div>
{% endblock %}
